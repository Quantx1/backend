# Nixpacks build config for Railway / Render / Fly Quant X v1 deploy.
#
# Why we have this file in addition to railway.toml:
#   - railway.toml picks the builder (NIXPACKS) and sets the start command.
#   - nixpacks.toml gives us deterministic control over the Python version.
#
# The Dockerfile is kept in sync with this file but is NOT used on Railway
# (railway.toml pins the NIXPACKS builder). It exists for local `docker build`
# and for platforms that auto-detect a Dockerfile — Fly, Render, plain Docker.
# If you change install steps here, mirror them there.
#
# Image size: ~1.5 GB. requirements.txt pulls CPU-only torch wheels via
# --extra-index-url; on the default PyPI index it would be ~4-6 GB.

[phases.setup]
nixPkgs = ["python312", "gcc", "pkg-config"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  # Force-pin huggingface-hub last so downstream installs don't downgrade
  # it (transformers 4.57+ hard-requires >=0.34.0).
  ". /opt/venv/bin/activate && pip install --force-reinstall --no-deps 'huggingface-hub>=0.34.0,<1.0'",
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn backend.api.app:app --host 0.0.0.0 --port $PORT"
